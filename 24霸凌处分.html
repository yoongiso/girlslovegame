<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霸凌处分</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .image-container {
            width: 60%;
            max-width: 500px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #E9ECF0;
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="simple-bar">
            <div class="simple-left">
                <span class="simple-dot"></span>
                <span>圣樱高级私立中学</span>
            </div>
            <span id="current-time"></span>
        </div>

        <!-- 修改后的搜索栏，添加 target="_blank" -->
        <div class="search-bar">
            <div class="search-group">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="输入关键词..." id="search-input">
                    <button class="search-button" id="search-button">搜索</button>
                </div>
            </div>
            <a href="09邮件.html" class="home-icon" title="返回工作台" target="_blank">🏠</a>
        </div>

        <div class="content-area">
            <div class="back-button" onclick="history.back()">返回</div>

            <div class="image-container">
                <img src="https://imgloc.com/image/O519Da" alt="图片素材">
            </div>
        </div>
    </div>

    <div class="progress-corner">
        <span>调查进度</span>
        <span class="progress-value" id="progress-value">29/43</span>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

    </script>
    <script src="search.js"></script>
</body>
</html>
